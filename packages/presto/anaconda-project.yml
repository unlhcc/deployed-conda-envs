name: pRESTO
description: A bioinformatics toolkit for processing high-throughput lymphocyte receptor
  sequencing data.
platforms:
- linux-64
env_specs:
  presto-0.7.2-py37:
    packages:
    - presto=0.7.2
    - python=3.7
    channels: []
  presto-0.7.2-py39:
    packages:
    - presto=0.7.2
    - python=3.9
    - numpy>=1.8
    - scipy>=0.14
    - pandas>=0.24
    - biopython>=1.81
    channels: []
  presto-0.7.4-py39:
    packages:
    - presto=0.7.4
    - python=3.9
    - numpy>=1.8
    - scipy>=0.14
    - pandas>=0.24
    - biopython>=1.81
    channels: []
  presto-0.7.9-py39:
    packages:
    - presto=0.7.9
    - python=3.9
    - numpy
    - scipy
    - pandas
    - biopython
    channels: []
