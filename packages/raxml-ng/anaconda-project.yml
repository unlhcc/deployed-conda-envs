name: raxml-ng
description: RAxML-NG is a phylogenetic tree inference tool which uses maximum-likelihood
  (ML) optimality criterion.
platforms:
- linux-64
env_specs:
  raxml-ng-1.0.3:
    packages:
    - raxml-ng=1.0.3
    - openmpi=4.1.*=external_1000
    channels: []
  raxml-ng-1.2.0:
    packages:
    - raxml-ng=1.2.0
    - openmpi=4.1.*=external_*
    channels: []
  raxml-ng-1.1.0:
    packages:
    - raxml-ng=1.1.0
    - openmpi=4.1.*=external_*
    channels: []
  raxml-ng-2.0.1:
    packages:
    - raxml-ng=2.0.1
    - openmpi=4.1.*=external_*
    channels: []
