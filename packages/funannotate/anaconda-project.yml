#

#
# Set the 'name' key to name your project
#
name: funannotate
description: funannotate is a pipeline for genome annotation (built specifically for
  fungi, but will also work with higher eukaryotes).
platforms:
- linux-64
env_specs:
  funannotate-1.8.17:
    packages:
    - python=3.8
    - funannotate=1.8.17
    - distro
    - r-base=4.1
    - conda-forge::openmpi
    - hcc::genemark-et
    channels:
    - nodefaults
commands:
  download-db-1.8.17:
    unix: mkdir -p $HCC_APPS_DB_BCRF_PATH/funannotate/1.8.17 && export AUGUSTUS_CONFIG_PATH=$CONDA_PREFIX/config && export FUNANNOTATE_DB=$HCC_APPS_DB_BCRF_PATH/funannotate/1.8.17 && funannotate setup -i all --wget
    env_spec: funannotate-1.8.17
