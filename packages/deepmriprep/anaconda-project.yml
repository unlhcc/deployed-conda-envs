# This is an Anaconda project file.
#
# Here you can describe your project and how to run it.
# Use `anaconda-project run` to run the project.
# The file is in YAML format, please see http://www.yaml.org/start.html for more.
#

#
# Set the 'name' key to name your project
#
name: deepmriprep

#
# Set a one-sentence-or-so 'description' key with project details
#
description: Neural network-based preprocessing of MRI data. Prepping brain images
  in seconds.

#
# In the platforms section, list platforms the project should work on
# Examples: "linux-64", "osx-64", "win-64"
# Use `anaconda-project add-platforms` to add platforms.
#
platforms:
- linux-64
env_specs:
  deepmriprep-0.1.0:
    packages:
    - deepmriprep=0.1.0=cuda*
    - python=3.9
    - wget
commands:
  model-download:
    unix: mkdir -p /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/
      && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/brain_extraction_bbox_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/brain_extraction_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_nogm_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_0_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_1_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_2_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_3_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_4_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_5_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_6_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_7_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_8_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_9_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_10_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_11_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_12_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_13_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_14_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_15_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_16_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_patch_17_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/segmentation_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/ && wget https://raw.githubusercontent.com/wwu-mmll/deepmriprep/main/deepmriprep/data/models/warp_model.pt
      -P /opt/conda/lib/python3.9/site-packages/deepmriprep/data/models/
    env_spec: deepmriprep-0.1.0
