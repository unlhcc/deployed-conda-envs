name: Trim Galore
description: Trim Galore! is a wrapper script to automate quality and adapter trimming
  as well as quality control, with some added functionality to remove biased methylation
  positions for RRBS sequence files (for directional, non-directional (or paired-end)
  sequencing).
platforms:
- linux-64
env_specs:
  trim-galore-0.4.5:
    packages:
    - openjdk=11.0
    - perl=5.26
    - python=2.7
    - trim-galore=0.4.5
    channels: []
  trim-galore-0.6.4:
    packages:
    - openjdk=11.0
    - perl=5.26
    - python=2.7
    - trim-galore=0.6.4
    channels: []
  trim-galore-0.6.5:
    packages:
    - trim-galore=0.6.5
    - openjdk=11.0
    - perl=5.26
    - python=3.7
    channels: []
  trim-galore-2.2.0:
    packages:
    - trim-galore=2.2.0
    - openjdk=21.0
    - perl=5.42
    - python=3.14
    channels: []
